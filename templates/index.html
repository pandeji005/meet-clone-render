<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Clone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Google Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

    <!-- Join Screen -->
    <div id="join-screen" class="screen active">
        <div class="glass-panel">
            <h1>Meet Clone</h1>
            <p>Premium Video Calling</p>
            <div class="room-info" style="margin-bottom: 20px;">
                <h3 style="margin-bottom: 8px;">Ready to join?</h3>
                <p style="color: #aeb5ff;">Meeting ID: <strong>{{ room_id }}</strong></p>
            </div>
            <input type="hidden" id="roomInput" value="{{ room_id }}">
            <button id="joinBtn" class="primary-btn" style="width: 100%; margin-bottom: 20px;">Enter Meeting</button>
            <div class="local-preview">
                <video id="previewVideo" autoplay muted playsinline></video>
                <div class="controls preview-controls">
                    <button id="previewMicBtn" class="control-btn active" title="Toggle Microphone">
                        <span class="material-symbols-outlined">mic</span>
                    </button>
                    <button id="previewCamBtn" class="control-btn active" title="Toggle Camera">
                        <span class="material-symbols-outlined">videocam</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Meeting Screen -->
    <div id="meeting-screen" class="screen">
        <div id="video-grid" class="video-grid">
            <!-- Local video container -->
            <div class="video-container" id="local-container">
                <div class="user-placeholder"><span class="material-symbols-outlined" style="font-size: 64px; color: rgba(255,255,255,0.2);">person</span></div>
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="user-label">You</div>
            </div>
        </div>

        <!-- Call Controls -->
        <div class="call-controls glass-bar">
            <button id="micBtn" class="control-btn active" title="Toggle Microphone">
                <span class="material-symbols-outlined">mic</span>
            </button>
            <button id="camBtn" class="control-btn active" title="Toggle Camera">
                <span class="material-symbols-outlined">videocam</span>
            </button>
            <button id="leaveBtn" class="control-btn danger" title="Leave Meeting">
                <span class="material-symbols-outlined">call_end</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
